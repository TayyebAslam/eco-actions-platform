paths:
  /student/activities:
    get:
      summary: Get my activities
      description: Retrieves a paginated list of activities submitted by the logged-in student.
      tags:
        - Student - Activities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page
          example: 10
        - name: category_id
          in: query
          schema:
            type: integer
            default: null
          description: Filter activities by category ID
          example: 1
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
            default: null
          description: Filter activities by status
          example: pending
        - name: search
          in: query
          schema:
            type: string
            default: ""
          description: Search by activity title or description
          example: "planted"
      responses:
        '200':
          description: Activities fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Activities fetched successfully"
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: number
                              example: 1
                            title:
                              type: string
                              example: "Planted trees in school garden"
                            description:
                              type: string
                              nullable: true
                              example: "Organized and planted 20 trees with classmates"
                            photos:
                              type: array
                              items:
                                type: string
                              example: ["https://example.com/photo1.jpg"]
                            status:
                              type: string
                              example: "pending"
                            points:
                              type: number
                              nullable: true
                              example: 0
                            category_id:
                              type: number
                              nullable: true
                              example: 1
                            category_name:
                              type: string
                              nullable: true
                              example: "Environment"
                            created_at:
                              type: string
                              format: date-time
                              example: "2026-01-30T10:30:00Z"
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      totalCount:
                        type: integer
                        example: 25
                      totalPages:
                        type: integer
                        example: 3
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Unauthorized"
        '403':
          description: Only students can access activities
        '500':
          description: Internal server error

    post:
      summary: Create a new activity (student submission)
      description: Allows a student to submit a new activity for their school
      tags:
        - Student - Activities
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - category_id
              properties:
                title:
                  type: string
                  description: Activity title
                  example: "Planted trees in school garden"
                description:
                  type: string
                  description: Detailed description of the activity
                  example: "Organized and planted 20 trees with classmates"
                category_id:
                  type: integer
                  description: Category ID for the activity
                  example: 1
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Array of photo files uploaded as proof
                  example: ["photo1.jpg", "photo2.jpg"]
      responses:
        '201':
          description: Activity created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Activity created successfully"
                  data:
                    type: object
                    properties:
                      id:
                        type: number
                        example: 1
                      title:
                        type: string
                        example: "Planted trees in school garden"
                      description:
                        type: string
                        example: "Organized and planted 20 trees with classmates"
                      photos:
                        type: array
                        items:
                          type: string
                        example: ["https://example.com/photo1.jpg"]
                      status:
                        type: string
                        example: "pending"
                      points:
                        type: number
                        example: 0
                      category_id:
                        type: number
                        example: 1
                      category_name:
                        type: string
                        example: "Environment"
                      user_id:
                        type: number
                        example: 2
                      created_at:
                        type: string
                        format: date-time
                        example: "2026-01-30T10:30:00Z"
        '400':
          description: Validation error or invalid category
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Validation failed"
                  data:
                    type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                              example: "title"
                            message:
                              type: string
                              example: "Title is required"
        '401':
          description: Unauthorized - missing authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Unauthorized - User ID not found"
        '500':
          description: Internal server error

  /student/activities/feed:
    get:
      summary: Get shared feed activities (school only)
      description: Retrieves a paginated list of activities shared to the feed for the student's school.
      tags:
        - Student - Activities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            example: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            example: 10
          description: Items per page
        - name: category_id
          in: query
          schema:
            type: integer
            default: null
            example: 1
          description: Filter activities by category ID
        - name: search
          in: query
          schema:
            type: string
            default: ""
            example: "tree"
          description: Search by activity title or description
      responses:
        '200':
          description: Feed activities fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Feed activities fetched successfully"
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            feed_id:
                              type: number
                              example: 1
                            feed_created_at:
                              type: string
                              format: date-time
                              example: "2026-02-05T10:45:00Z"
                            bio:
                              type: string
                              nullable: true
                              example: "Feeling proud of this today!"
                            id:
                              type: number
                              example: 10
                            title:
                              type: string
                              example: "Planted trees in school garden"
                            description:
                              type: string
                              nullable: true
                              example: "Organized and planted 20 trees with classmates"
                            photos:
                              type: array
                              items:
                                type: string
                              example: ["https://example.com/photo1.jpg"]
                            status:
                              type: string
                              example: "approved"
                            points:
                              type: number
                              nullable: true
                              example: 50
                            category_id:
                              type: number
                              nullable: true
                              example: 1
                            category_name:
                              type: string
                              nullable: true
                              example: "Environment"
                            likes_count:
                              type: integer
                              example: 24
                            comments_count:
                              type: integer
                              example: 5
                            is_liked:
                              type: boolean
                              example: true
                            is_bookmarked:
                              type: boolean
                              example: false
                            created_at:
                              type: string
                              format: date-time
                              example: "2026-02-05T10:30:00Z"
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      totalCount:
                        type: integer
                        example: 25
                      totalPages:
                        type: integer
                        example: 3
        '401':
          description: Unauthorized
        '403':
          description: Only students can access activity feed
        '500':
          description: Internal server error

  /student/activities/bookmarks:
    get:
      summary: Get bookmarked shared feed activities
