components:
  schemas:
    ChallengeListItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Recycle Plastic Bottles"
        description:
          type: string
          example: "Help the environment by recycling plastic bottles"
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          example: true
        challenge_type_name:
          type: string
          example: "recycling"
        challenge_type_label:
          type: string
          example: "Recycling"
        category_name:
          type: string
          nullable: true
          example: "Environment"
        category_icon:
          type: string
          nullable: true
          example: "http://localhost:5000/categories/recycle.png"
        is_joined:
          type: boolean
          example: false
          description: Whether the student has joined this challenge
        my_progress:
          nullable: true
          $ref: '#/components/schemas/MyProgress'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ChallengeVariant'

    ChallengeDetail:
      allOf:
        - $ref: '#/components/schemas/ChallengeListItem'
        - type: object
          properties:
            participant_count:
              type: integer
              example: 25
              description: Total number of students participating

    ChallengeVariant:
      type: object
      properties:
        id:
          type: integer
          example: 1
        challenge_id:
          type: integer
          example: 1
        name:
          type: string
          example: "Beginner"
        description:
          type: string
          example: "Recycle 10 bottles"
        target_count:
          type: integer
          example: 10
        target_unit:
          type: string
          example: "bottles"
        points:
          type: integer
          example: 50

    MyProgress:
      type: object
      properties:
        progress_id:
          type: integer
          example: 1
        variant_id:
          type: integer
          example: 1
        variant_name:
          type: string
          example: "Beginner"
        status:
          type: string
          enum: [in_progress, completed]
          example: "in_progress"
        current_count:
          type: integer
          example: 5
        target_count:
          type: integer
          example: 10
        target_unit:
          type: string
          example: "bottles"
        points:
          type: integer
          example: 50
        completed_at:
          type: string
          format: date-time
          nullable: true

    MyChallengeItem:
      type: object
      properties:
        progress_id:
          type: integer
          example: 1
        challenge_id:
          type: integer
          example: 5
        challenge_title:
          type: string
          example: "Recycle Plastic Bottles"
        challenge_description:
          type: string
          example: "Help the environment by recycling"
        variant_name:
          type: string
          example: "Beginner"
        variant_description:
          type: string
          example: "Recycle 10 bottles"
        challenge_type_name:
          type: string
          example: "recycling"
        challenge_type_label:
          type: string
          example: "Recycling"
        category_name:
          type: string
          nullable: true
          example: "Environment"
        category_icon:
          type: string
          nullable: true
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          example: true
        status:
          type: string
          enum: [in_progress, completed]
          example: "in_progress"
        current_count:
          type: integer
          example: 5
        target_count:
          type: integer
          example: 10
        target_unit:
          type: string
          example: "bottles"
        points:
          type: integer
          example: 50
        completed_at:
          type: string
          format: date-time
          nullable: true
        progress_percentage:
          type: integer
          minimum: 0
          maximum: 100
          example: 50

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalCount:
          type: integer
          example: 25
        totalPages:
          type: integer
          example: 3

