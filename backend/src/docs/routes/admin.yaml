paths:
  /admin/admins:
    post:
      summary: Create a new admin
      description: |
        Create a new admin or sub admin account. 
        
        Permission rules:
        - Super Admin: Can create both admin and sub_admin roles. school_id is REQUIRED when Super Admin creates an admin.
        - Admin: Can only create sub_admin roles. school_id is OPTIONAL (inherited from requester's school if not provided).
        - Sub Admin: Cannot create any admin users.
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - password
                - role
              properties:
                first_name:
                  type: string
                  example: John
                  description: First name of the admin (2-50 characters)
                last_name:
                  type: string
                  example: Doe
                  description: Last name of the admin (2-50 characters)
                email:
                  type: string
                  format: email
                  example: admin@example.com
                  description: Unique email address for the admin
                password:
                  type: string
                  minLength: 8
                  example: "Password123!@"
                  description: "Password must contain uppercase, lowercase, number and special character (@$!%*?&#)"
                role:
                  type: string
                  enum: [admin, sub_admin]
                  example: admin
                  description: "Role type: 'admin' for full administrative access, 'sub_admin' for limited access"
                school_id:
                  type: number
                  example: 1
                  description: |
                    School ID to associate with the admin.
                    - REQUIRED when role is admin.
                    - OPTIONAL when role is sub_admin.
      responses:
        "201":
          description: Admin created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 5
                      email:
                        type: string
                        example: admin@example.com
                      first_name:
                        type: string
                        example: John
                      last_name:
                        type: string
                        example: Doe
                      role:
                        type: string
                        example: admin
                      school_id:
                        type: integer
                        example: 1
                      is_active:
                        type: boolean
                        example: true
        "400":
          description: Validation error or email already exists
        "403":
          description: Insufficient permissions to create admin
    get:
      summary: Get all admins
      description: Get paginated list of all school admins and sub admins
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Items per page
      responses:
        "200":
          description: Admins fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admins fetched successfully
                  data:
                    type: object
                    properties:
                      admins:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            email:
                              type: string
                            first_name:
                              type: string
                            last_name:
                              type: string
                            role:
                              type: string
                            is_active:
                              type: boolean
                            school_id:
                              type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
        "403":
          description: Only Super Admin can view admins
  /admin/admins/{id}:
    get:
      summary: Get admin by ID
      description: Get details of a specific admin
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Admin user ID
      responses:
        "200":
          description: Admin fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin fetched successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      role:
                        type: string
                      is_active:
                        type: boolean
                      school_id:
                        type: integer
                      job_title:
                        type: string
        "403":
          description: Only Super Admin can view admin details
        "404":
          description: Admin not found
    put:
      summary: Update admin
      description: Update admin details
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Admin user ID
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                role:
                  type: string
                  enum: [admin, sub_admin]
                school_id:
                  type: number
                job_title_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Optional job title (badge) assignment
                is_active:
                  type: boolean
      responses:
        "200":
          description: Admin updated successfully
        "400":
          description: Validation error or email already exists
        "403":
          description: Only Super Admin can update admins
        "404":
          description: Admin not found
    delete:
      summary: Delete admin
      description: Permanently delete an admin
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Admin user ID
      responses:
        "200":
          description: Admin deleted successfully
        "403":
          description: Only Super Admin can delete admins
        "404":
          description: Admin not found
  /admin/admins/{id}/toggle-status:
    patch:
      summary: Toggle admin status
      description: Activate or deactivate an admin account
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Admin user ID
      responses:
        "200":
          description: Admin status toggled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin activated successfully
                  data:
                    type: object
                    properties:
                      is_active:
                        type: boolean
                        example: true
        "403":
          description: Only Super Admin can toggle admin status
        "404":
          description: Admin not found
  /admin/categories:
    post:
      summary: Create a new activity category
      description: Create a new category for activities. Requires admin authentication.
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Category name
                  example: "Environment"
                color:
                  type: string
                  description: Hex color code for the category
                  example: "#4CAF50"
                units:
                  type: string
                  description: Comma-separated or JSON array of unit strings (e.g. "kg,m" or "[\"kg\",\"m\"]"). The API accepts either a string or an array.
                  example: "kg,m"
                icon:
                  type: string
                  format: binary
                  description: Icon image file (PNG, JPG, etc.)
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "Category created successfully"
                  data:
                    type: object
                    properties:
                      id:
                        type: number
                        example: 1
                      name:
                        type: string
                        example: "Environment"
                      color:
                        type: string
                        example: "#4CAF50"
                      icon_url:
                        type: string
                        example: "/uploads/categories/icon-1.png"
                      units:
                        type: array
                        items:
                          type: string
                        example: ["kg", "m"]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: "Validation failed"
        "401":
          description: Unauthorized - Missing authentication
        "500":
          description: Internal server error
    get:
      summary: Get all categories
      description: Retrieves all activity categories.
      tags:
        - Admin Management
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Categories fetched successfully
        "403":
          description: Forbidden
        "500":
          description: Internal server error
  /admin/activities:
    get:
      summary: Get all activities (admin)
      description: Retrieves a paginated list of all activities with optional filters. Requires admin authentication.
      tags:
        - Admin - Activities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
          description: Filter activities by status
        - name: school_id
          in: query
          schema:
            type: integer
          description: Filter activities by school ID
        - name: category_id
          in: query
          schema:
            type: integer
          description: Filter activities by category ID (activity or challenge category)
        - name: search
          in: query
          schema:
            type: string
          description: Search by activity title or description
      responses:
        "200":
          description: Activities fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Activities fetched successfully"
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: number
                              example: 1
                            title:
                              type: string
                              example: "Planted trees in school garden"
                            description:
                              type: string
                              nullable: true
                              example: "Organized and planted 20 trees with classmates"
                            photos:
                              type: array
                              items:
                                type: string
                              example: ["https://example.com/photo1.jpg"]
                            status:
                              type: string
                              example: "pending"
                            points:
                              type: number
                              nullable: true
                              example: 0
                            user_id:
                              type: number
                              example: 2
                            user_email:
                              type: string
                              nullable: true
                              example: "student@example.com"
                            first_name:
                              type: string
                              nullable: true
                              example: "Ayesha"
                            last_name:
                              type: string
                              nullable: true
                              example: "Khan"
                            school_id:
                              type: number
                              nullable: true
                              example: 3
                            school_name:
                              type: string
                              nullable: true
                              example: "Green Valley School"
                            category_id:
                              type: number
                              nullable: true
                              example: 1
                            category_name:
                              type: string
                              nullable: true
                              example: "Environment"
                            challenge_title:
                              type: string
                              nullable: true
                              example: "Plant a Tree Week"
                            challenge_description:
                              type: string
                              nullable: true
                              example: "Plant a tree and share a photo"
                            created_at:
                              type: string
                              format: date-time
                              example: "2026-01-30T10:30:00Z"
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      totalCount:
                        type: integer
                        example: 25
                      totalPages:
                        type: integer
                        example: 3
        "401":
          description: Unauthorized
        "403":
          description: Only admins can access activities
        "500":
          description: Internal server error
  /admin/activities/{id}:
