  /student/leaderboard:
    get:
      summary: Get student leaderboard
      description: |
        Returns a school-scoped leaderboard for students.
        Ranking is based on `period_points` (descending), then `total_points`, then `xp`.
        Supports week/month/semester/all-time periods and optional category filtering.
      tags: [Student - Leaderboard]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: time_period
          in: query
          schema:
            type: string
            enum: [week, month, semester, all_time]
            default: semester
            example: semester
          description: Leaderboard period
        - name: category_id
          in: query
          schema:
            type: integer
            default: null
            example: 1
          description: Optional category filter. Omit for all categories.
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            example: 1
          description: Page number for `others` list (ranks after top 3)
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            example: 10
          description: Items per page for `others` list
      responses:
        '200':
          description: Leaderboard fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Leaderboard fetched successfully
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                        enum: [week, month, semester, all_time]
                        example: semester
                      period_range:
                        nullable: true
                        type: object
                        properties:
                          start:
                            type: string
                            format: date-time
                            example: "2026-01-01T00:00:00.000Z"
                          end:
                            type: string
                            format: date-time
                            example: "2026-06-30T23:59:59.999Z"
                      category_id:
                        nullable: true
                        type: integer
                        example: 3
                      top_three:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: integer
                              example: 12
                            name:
                              type: string
                              example: Sarah Mitchell
                            avatar_url:
                              type: string
                              nullable: true
                              example: "http://localhost:5000/public/avatars/sarah.png"
                            level:
                              type: integer
                              example: 12
                            xp:
                              type: integer
                              example: 4800
                            total_points:
                              type: integer
                              example: 4800
                            period_points:
                              type: integer
                              example: 1200
                            position:
                              type: integer
                              example: 1
                      others:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: integer
                              example: 45
                            name:
                              type: string
                              example: Marcus Chen
                            avatar_url:
                              type: string
                              nullable: true
                            level:
                              type: integer
                              example: 10
                            xp:
                              type: integer
                              example: 4100
                            total_points:
                              type: integer
                              example: 4100
                            period_points:
                              type: integer
                              example: 900
                            position:
                              type: integer
                              example: 4
                      me:
                        nullable: true
                        type: object
                        properties:
                          user_id:
                            type: integer
                            example: 45
                          name:
                            type: string
                            example: Marcus Chen
                          avatar_url:
                            type: string
                            nullable: true
                          level:
                            type: integer
                            example: 10
                          xp:
                            type: integer
                            example: 4100
                          total_points:
                            type: integer
                            example: 4100
                          period_points:
                            type: integer
                            example: 900
                          position:
                            type: integer
                            example: 4
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 10
                          totalCount:
                            type: integer
                            example: 27
                          totalPages:
                            type: integer
