services:
  postgres:
    image: postgres:16-alpine
    container_name: eco-actions-db
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER must be set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-eco_actions_db}
    ports:
      - "5432:5432"
    volumes:
      - eco-actions_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eco-actions-redis
    restart: on-failure
    ports:
      - "6379:6379"
    volumes:
      - eco-actions_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eco-actions-backend:
    build: .
    container_name: eco-actions-backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:?DB_USER must be set}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-eco_actions_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    working_dir: /app
    command: ["npx", "nodemon", "src/index.ts"]

volumes:
  eco-actions_pg_data:
  eco-actions_redis_data:
