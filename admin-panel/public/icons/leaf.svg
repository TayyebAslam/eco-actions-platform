<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" class="lucide lucide-leaf-icon lucide-leaf">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(16 185 129)" />
      <stop offset="50%" stop-color="rgb(8, 179, 88)" />
    
    </linearGradient>
    <linearGradient id="leafGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgb(16 185 129)" />
      <stop offset="50%" stop-color="rgb(8, 179, 88)" />
     
    </linearGradient>
  </defs>

  <!-- background gradient -->  
  <rect width="30" height="30" fill="url(#bg)" rx="4" />

  <!-- leaf filled with reversed gradient, white outline -->
  <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"
        fill="url(#leafGrad)"
        stroke="#ffffff"
        stroke-width="1"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- inner vein: white line -->
  <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"
        fill="none"
        stroke="#ffffff"
        stroke-opacity="0.98"
        stroke-width="1"
        stroke-linecap="round"
        stroke-linejoin="round" />
</svg>