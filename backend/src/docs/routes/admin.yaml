  /admin/levels/apply-formula:
    post:
      summary: Apply level difficulty formula
      description: Regenerates level XP thresholds from a formula and realigns student levels based on current XP.
      tags:
        - Admin - Levels
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                total_levels:
                  type: integer
                  minimum: 2
                  maximum: 500
                  default: 100
                base_min_xp:
                  type: integer
                  minimum: 0
                  default: 0
                initial_gap:
                  type: integer
                  minimum: 1
                  default: 100
                tier_size:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
                base_increment:
                  type: integer
                  minimum: 1
                  default: 10
                growth_divisor:
                  type: number
                  exclusiveMinimum: 0
                  default: 50
                title_prefix:
                  type: string
                  minLength: 1
                  default: Level
      responses:
        "200":
          description: Level difficulty formula applied successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Level difficulty formula applied successfully
                  data:
                    type: object
                    properties:
                      formula:
                        type: object
                        properties:
                          total_levels:
                            type: integer
                          base_min_xp:
                            type: integer
                          initial_gap:
                            type: integer
                          tier_size:
                            type: integer
                          base_increment:
                            type: integer
                          growth_divisor:
                            type: number
                          title_prefix:
                            type: string
                      preview:
                        type: object
                        properties:
                          first:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                title:
                                  type: string
                                min_xp:
                                  type: integer
                          last:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                title:
                                  type: string
                                min_xp:
                                  type: integer
        "400":
          description: Validation error
        "403":
          description: You don't have permission to update level difficulty
        "500":
          description: Internal server error
