            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Activity fetched successfully"
                  data:
                    type: object
                    properties:
                      id:
                        type: number
                        example: 1
                      title:
                        type: string
                        example: "Planted trees in school garden"
                      description:
                        type: string
                        nullable: true
                        example: "Organized and planted 20 trees with classmates"
                      photos:
                        type: array
                        items:
                          type: string
                        example: ["https://example.com/photo1.jpg"]
                      status:
                        type: string
                        example: "pending"
                      points:
                        type: number
                        nullable: true
                        example: 0
                      user_id:
                        type: number
                        example: 2
                      user_email:
                        type: string
                        nullable: true
                        example: "student@example.com"
                      first_name:
                        type: string
                        nullable: true
                        example: "Ayesha"
                      last_name:
                        type: string
                        nullable: true
                        example: "Khan"
                      school_id:
                        type: number
                        nullable: true
                        example: 3
                      school_name:
                        type: string
                        nullable: true
                        example: "Green Valley School"
                      category_id:
                        type: number
                        nullable: true
                        example: 1
                      category_name:
                        type: string
                        nullable: true
                        example: "Environment"
                      category_icon:
                        type: string
                        nullable: true
                        example: "https://example.com/uploads/categories/icon-1.png"
                      challenge_title:
                        type: string
                        nullable: true
                        example: "Plant a Tree Week"
                      challenge_description:
                        type: string
                        nullable: true
                        example: "Plant a tree and share a photo"
                      likes_count:
                        type: number
                        example: 5
                      comments_count:
                        type: number
                        example: 2
                      reviewer:
                        type: object
                        nullable: true
                        properties:
                          id:
                            type: number
                            example: 10
                          email:
                            type: string
                            example: "admin@example.com"
                          first_name:
                            type: string
                            example: "Admin"
                          last_name:
                            type: string
                            example: "User"
                      created_at:
                        type: string
                        format: date-time
                        example: "2026-01-30T10:30:00Z"
        "400":
          description: Invalid activity ID
        "401":
          description: Unauthorized
        "404":
          description: Activity not found
        "500":
          description: Internal server error
  /admin/activities/{id}/review:
    post:
      summary: Approve or reject a student activity (admin)
      description: Review a pending activity by either approving (award points) or rejecting (provide reason). Only pending activities can be reviewed.
      tags:
        - Admin - Activities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Activity ID to review
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              oneOf:
                - type: object
                  required:
                    - status
                    - points
                  properties:
                    status:
                      type: string
                      enum: [approved]
                    points:
                      type: integer
                      example: 10
                - type: object
                  required:
                    - status
                    - rejection_reason
                  properties:
                    status:
                      type: string
                      enum: [rejected]
                    rejection_reason:
                      type: string
                      example: "Incomplete work"
      responses:
        "200":
          description: Activity reviewed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Activity approved successfully"
                  data:
                    type: object
                    properties:
                      points:
                        type: integer
                        nullable: true
                        example: 10
              examples:
                approved:
                  summary: Approved response
                  value:
                    success: true
                    message: "Activity approved successfully"
                    data:
                      points: 10
                rejected:
                  summary: Rejected response
                  value:
                    success: true
                    message: "Activity rejected successfully"
                    data: {}
        "400":
          description: Bad request - missing points or rejection reason, or activity not pending
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Activity not found
        "500":
          description: Internal server error
  /admin/articles:
    post:
      summary: Create a new article
      description: Create a new article with optional cover image. Requires admin or teacher authentication.
      tags:
        - Admin - Articles
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - content
                - category_id
              properties:
                title:
                  type: string
                  example: "Sustainability at School"
                content:
                  type: string
                  example: "Tips and practices for sustainable living at school."
                category_id:
                  type: integer
                  example: 1
                points:
                  type: integer
                  example: 10
                school_id:
                  type: integer
                  nullable: true
                  example: 1
                cover_image:
                  type: string
                  format: binary
                  description: Optional cover image for the article
                thumbnail_image:
                  type: string
                  format: uri
                  example: "thumbnail_image_url"
                  description: Optional thumbnail image for the article
      responses:
        "201":
          description: Article created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Article created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 12
                      title:
                        type: string
                        example: "Sustainability at School"
                      content:
                        type: string
                        example: "Tips and practices for sustainable living at school."
                      cover_image:
                        type: string
                        nullable: true
                        example: "https://api.eco-actions.com/articles/article-12.png"
                      thumbnail_image:
                        type: string
                        nullable: true
                        example: "https://api.eco-actions.com/articles/article-12-thumbnail.png"
                      points:
                        type: integer
                        example: 10
                      category_id:
                        type: integer
                        example: 1
                      category_name:
                        type: string
                        nullable: true
                        example: "Environment"
                      school_id:
                        type: integer
                        nullable: true
                        example: 1
                      author_id:
                        type: integer
                        example: 5
                      created_at:
                        type: string
                        format: date-time
                        example: "2026-02-09T12:00:00Z"
        "400":
          description: Validation error
        "403":
          description: You don't have permission to create articles
        "500":
          description: Internal server error
    get:
      summary: Get all articles
      description: Retrieves a paginated list of articles with optional filters. Requires admin or teacher authentication.
      tags:
        - Admin - Articles
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page
        - name: school_id
          in: query
          schema:
            type: integer
          description: Filter articles by school ID
        - name: search
