          description: Invalid export mode or invalid teacher context
        '401':
          description: Unauthorized
        '403':
          description: Only teacher role can access this endpoint
        '500':
          description: Internal server error

  /teacher/activities/{activityId}/review:
    post:
     summary: Approve or reject a student activity
     description: >
       Review a pending activity by either approving (award points) or rejecting (provide reason).
       Only pending activities can be reviewed.
     tags: [Teacher]
     security:
       - bearerAuth: []
       - cookieAuth: []
     parameters:
       - name: activityId
         in: path
         required: true
         schema:
           type: integer
         description: Activity ID to review
     requestBody:
       required: true
       content:


         multipart/form-data:

           schema:
             type: object
             required:
               - status
             properties:

                status:
                  type: string
                  enum: [approved, rejected]
                  description: Use `approved` to award points, or `rejected` with a rejection reason.
                  example: approved
                points:
                  type: integer
                  description: Required when `status=approved`.
                  example: 10
                rejection_reason:
                  type: string
                  description: Required when `status=rejected`.
                  example: "Incomplete work"


     responses:
       '200':
         description: Activity reviewed successfully
         content:
           application/json:
             schema:
               type: object
               properties:
                 success:
                   type: boolean
                   example: true
                 message:
                   type: string
                   example: "Activity approved successfully"
                 data:
                   type: object
                   properties:
                     points:
                       type: integer
                       example: 10
       '400':
         description: Bad request - missing points or rejection reason, or activity not pending
       '401':
         description: Unauthorized
       '404':
         description: Activity not found
       '500':
         description: Internal server error

